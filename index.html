<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多目标优化可视化平台</title>
    <!-- 引入 ECharts 库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <style>
        /* --- CSS 样式部分 --- */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f4f6f9; /* 浅灰背景，护眼 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            background-color: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            padding: 30px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-weight: 300;
        }

        /* 图表容器：必须有明确的宽高 */
        #main-chart {
            width: 100%;
            height: 600px;
            border: 1px solid #eee;
            border-radius: 8px;
            background-color: #fafafa;
        }

        .loading {
            text-align: center;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>⚡ 机组运行成本与碳排放优化分析</h2>
        <!-- 图表挂载点 -->
        <div id="main-chart"></div>
        <div id="status" class="loading">正在连接后端计算...</div>
    </div>

    <!-- --- JavaScript 逻辑部分 --- -->
    <script>
        // 1. 初始化 ECharts 实例
        var myChart = echarts.init(document.getElementById('main-chart'));
        var statusDiv = document.getElementById('status');

        // 2. 配置图表选项
        var option = {
            tooltip: {
                trigger: 'item',
                backgroundColor: 'rgba(255, 255, 255, 0.9)',
                borderColor: '#e0e0e0',
                borderWidth: 1,
                textStyle: { color: '#333' },
                formatter: function (params) {
                    return `
                        <b>优化方案 ${params.dataIndex + 1}</b><br/>
                        💰 成本: ${params.value[0].toFixed(4)} 元/kWh<br/>
                        🌿 碳排放: ${params.value[1].toFixed(4)} kgCO2/kWh
                    `;
                }
            },
            grid: {
                left: '12%',
                right: '8%',
                bottom: '12%',
                top: '15%',
                containLabel: true
            },
            xAxis: {
                name: '单位成本 (元/kWh)',
                nameLocation: 'middle',
                nameGap: 30,
                type: 'value',
                scale: true, // 自动调整坐标轴范围，不从0开始
                splitLine: {
                    lineStyle: { type: 'dashed' }
                }
            },
            yAxis: {
                name: '碳排放强度 (kgCO2/kWh)',
                nameLocation: 'middle',
                nameGap: 40,
                type: 'value',
                scale: true,
                splitLine: {
                    lineStyle: { type: 'dashed' }
                }
            },
            series: [
                {
                    name: '帕累托最优解',
                    type: 'scatter',
                    symbolSize: 12,
                    data: [], // 数据将通过 API 填充
                    itemStyle: {
                        color: new echarts.graphic.RadialGradient(0.4, 0.3, 1, [
                            { offset: 0, color: '#5470C6' },
                            { offset: 1, color: '#91CC3E' }
                        ]),
                        shadowBlur: 10,
                        shadowColor: 'rgba(84, 112, 198, 0.5)'
                    },
                    markLine: {
                        silent: true,
                        lineStyle: { color: '#333', width: 1, type: 'solid' },
                        data: [{ type: 'average', name: '平均值' }]
                    }
                }
            ]
        };

        // 3. 向后端发送请求
        // 注意：这里对应 Python 的 /api/optimize 接口
        fetch('http://127.0.0.1:5000/api/optimize', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ load: 180 }) // 发送模拟参数
        })
        .then(response => {
            if (!response.ok) throw new Error('网络响应错误');
            return response.json();
        })
        .then(result => {
            statusDiv.innerText = "数据加载完成";
            console.log("获取到的数据:", result);

            if (result.success) {
                // 将后端返回的数据赋值给图表
                option.series[0].data = result.data;
                myChart.setOption(option);
            } else {
                statusDiv.innerText = "❌ 错误: " + result.message;
                console.error(result.message);
            }
        })
        .catch(error => {
            statusDiv.innerText = "❌ 无法连接后端，请确保 app.py 正在运行 (端口 5000)";
            console.error("请求失败:", error);
        });

        // 4. 响应式处理：窗口大小改变时重绘图表
        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
</body>
</html>
